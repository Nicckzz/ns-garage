<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NS Garage | Custom & Detailing</title>
  <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d; --bg2: #141414; --bg3: #1a1a1a;
      --purple: #7c3aed; --purple-light: #a855f7;
      --purple-glow: rgba(124,58,237,0.18);
      --white: #f5f5f5; --muted: #888;
      --border: rgba(255,255,255,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 400; line-height: 1.6; overflow-x: hidden; }

    /* ── NAV ── */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 5%; background: rgba(13,13,13,0.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); gap: 16px; }

    .nav-logo-img { height: 36px; width: auto; display: block; }
    .hero-logo-img { width: min(500px, 80vw); height: auto; margin: 0 auto 24px; display: block; filter: drop-shadow(0 0 20px rgba(124,58,237,0.4)); }
    .footer-logo-img { height: 32px; width: auto; display: block; }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--white); text-decoration: none; flex-shrink: 0; }
    .nav-logo span { color: var(--purple-light); }
    .nav-center { display: flex; gap: 28px; list-style: none; }
    .nav-center a { color: var(--muted); text-decoration: none; font-size: 0.82rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; }
    .nav-center a:hover { color: var(--white); }
    .nav-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .nav-cta { background: var(--purple); color: #fff !important; padding: 9px 18px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; text-decoration: none; letter-spacing: 0.5px; transition: background 0.2s; white-space: nowrap; }
    .nav-cta:hover { background: var(--purple-light); }

    /* Lang switcher */
    .lang-switcher { display: flex; gap: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
    .lang-btn { background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.5px; padding: 4px 8px; border-radius: 5px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
    .lang-btn:hover { color: var(--white); }
    .lang-btn.active { background: var(--purple); color: #fff; }
    .lang-btn .flag { font-size: 0.9rem; }

    /* Hamburger */
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: all 0.3s; }

    /* ── HERO ── */
    #home { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 120px 5% 80px; position: relative; overflow: hidden; }
    .hero-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    .hero-bg { position: absolute; inset: 0; z-index: 1; background: linear-gradient(180deg, rgba(13,13,13,0.55) 0%, rgba(13,13,13,0.75) 60%, #0d0d0d 100%); }
    .hero-overlay-purple { position: absolute; inset: 0; z-index: 1; background: radial-gradient(ellipse 70% 50% at 50% 60%, rgba(124,58,237,0.18) 0%, transparent 70%); }
    .hero-grid { position: absolute; inset: 0; z-index: 1; background-image: linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px); background-size: 60px 60px; }
    .hero-content { position: relative; z-index: 2; max-width: 800px; }
    .hero-eyebrow { display: inline-block; font-size: 0.75rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--purple-light); margin-bottom: 20px; border: 1px solid rgba(168,85,247,0.3); padding: 6px 16px; border-radius: 100px; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 10vw, 7.5rem); line-height: 0.95; letter-spacing: 2px; margin-bottom: 24px; }
    .hero-title .accent { color: var(--purple-light); }
    .hero-sub { font-size: 1.05rem; color: var(--muted); max-width: 520px; margin: 0 auto 40px; font-weight: 300; }
    .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { background: var(--purple); color: #fff; padding: 14px 32px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.5px; text-decoration: none; transition: background 0.2s, transform 0.2s; }
    .btn-primary:hover { background: var(--purple-light); transform: translateY(-1px); }
    .btn-ghost { border: 1px solid var(--border); color: var(--white); padding: 14px 32px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: border-color 0.2s, background 0.2s; }
    .btn-ghost:hover { border-color: var(--purple); background: var(--purple-glow); }
    .hero-stats { display: flex; gap: 48px; justify-content: center; margin-top: 64px; padding-top: 40px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--purple-light); letter-spacing: 1px; }
    .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    /* ── SECTIONS ── */
    section { padding: 100px 5%; }
    .section-eyebrow { font-size: 0.72rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--purple-light); margin-bottom: 12px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem, 5vw, 3.5rem); line-height: 1; letter-spacing: 1px; margin-bottom: 16px; }
    .section-sub { color: var(--muted); font-size: 0.95rem; max-width: 480px; font-weight: 300; }
    .section-header { margin-bottom: 56px; }

    /* ── SERVICES ── */
    #services { background: var(--bg2); }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .service-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 32px; transition: border-color 0.3s, transform 0.3s; position: relative; overflow: hidden; }
    .service-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--purple), var(--purple-light)); opacity: 0; transition: opacity 0.3s; }
    .service-card:hover { border-color: var(--purple); transform: translateY(-4px); }
    .service-card:hover::before { opacity: 1; }
    .service-icon { font-size: 2rem; margin-bottom: 16px; display: block; }
    .service-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 10px; }
    .service-desc { color: var(--muted); font-size: 0.88rem; line-height: 1.7; margin-bottom: 20px; }
    .service-price { font-size: 0.82rem; color: var(--purple-light); font-weight: 600; letter-spacing: 0.5px; }

    /* ── GALLERY ── */
    #gallery { background: var(--bg); }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .gallery-item { background: var(--bg3); border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; position: relative; border: 1px solid var(--border); cursor: pointer; transition: transform 0.3s; }
    .gallery-item:hover { transform: scale(1.02); }
    .gallery-item.featured { grid-column: span 2; aspect-ratio: 16/9; }
    .gallery-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(135deg, var(--bg3) 0%, #1c1228 100%); }
    .gallery-placeholder .icon { font-size: 2.5rem; opacity: 0.4; }
    .gallery-placeholder .label { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .gallery-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(124,58,237,0.5) 0%, transparent 60%); opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; padding: 16px; }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-overlay span { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px; }
    .gallery-note { text-align: center; margin-top: 28px; color: var(--muted); font-size: 0.83rem; }

    /* ── BOOKING ── */
    #booking { background: var(--bg2); }
    .booking-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .booking-info h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 6px; margin-top: 28px; color: var(--purple-light); }
    .booking-info h3:first-child { margin-top: 0; }
    .booking-info p { color: var(--muted); font-size: 0.9rem; line-height: 1.7; }
    .booking-form { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 36px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; transition: border-color 0.2s; appearance: none; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--purple); }
    .form-group select option { background: #1a1a1a; }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-submit { width: 100%; background: var(--purple); color: #fff; border: none; padding: 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px; letter-spacing: 0.5px; }
    .form-submit:hover { background: var(--purple-light); }
    .form-disclaimer { text-align: center; margin-top: 12px; font-size: 0.75rem; color: var(--muted); }
    .form-success { display: none; text-align: center; padding: 40px 20px; }
    .form-success .check { font-size: 3rem; margin-bottom: 16px; }
    .form-success h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 1px; margin-bottom: 8px; color: var(--purple-light); }
    .form-success p { color: var(--muted); font-size: 0.9rem; }

    /* ── FOOTER ── */
    footer { background: #080808; border-top: 1px solid var(--border); padding: 48px 5%; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: var(--white); }
    .footer-logo span { color: var(--purple-light); }
    .footer-copy { font-size: 0.8rem; color: var(--muted); }
    .footer-links { display: flex; gap: 24px; list-style: none; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: 0.82rem; transition: color 0.2s; }
    .footer-links a:hover { color: var(--purple-light); }

    .calendly-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    /* ── MOBILE ── */
    @media (max-width: 820px) {
      .nav-center { display: none; flex-direction: column; gap: 0; }
      .nav-center.open { display: flex; position: absolute; top: 100%; left: 0; right: 0; background: #0d0d0d; border-bottom: 1px solid var(--border); padding: 16px 5%; }
      .nav-center.open li { border-bottom: 1px solid var(--border); }
      .nav-center.open a { display: block; padding: 12px 0; }
      .hamburger { display: flex; }
      .nav-cta { display: none; }
      .gallery-grid { grid-template-columns: 1fr 1fr; }
      .gallery-item.featured { grid-column: span 2; }
      .booking-wrap { grid-template-columns: 1fr; gap: 40px; }
      .form-row { grid-template-columns: 1fr; }
      footer { flex-direction: column; text-align: center; }
      .footer-links { justify-content: center; }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-item.featured { grid-column: span 1; aspect-ratio: 4/3; }
      .hero-stats { gap: 28px; }
      .lang-btn .flag { display: none; }
    }
  </style>
</head>

let currentLang = 'pt';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key] !== undefined) el.textContent = i18n[lang][key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    if (i18n[lang][key] !== undefined) el.placeholder = i18n[lang][key];
  });
  ['pt','en','es'].forEach(l => document.getElementById('btn-'+l).classList.remove('active'));
  document.getElementById('btn-'+lang).classList.add('active');
  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : lang === 'es' ? 'es' : 'en';
}
