<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS Garage 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0d0d0d; font-family:sans-serif; }
#c { position:absolute; inset:0; width:100%; height:100%; display:block; cursor:grab; }
#c:active { cursor:grabbing; }

.hint {
  position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.07);
  border-radius:20px; padding:5px 14px; font-size:0.68rem; color:#555;
  white-space:nowrap; z-index:20; pointer-events:none;
}

.loading {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:50;
  background:#0d0d0d; gap:16px;
}
.loading-bar-wrap { width:200px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; }
.loading-bar { height:100%; background:linear-gradient(90deg,#7c3aed,#a855f7); border-radius:2px; transition:width 0.3s; width:0%; }
.loading-text { color:#666; font-size:0.8rem; letter-spacing:1px; }

/* HOTSPOTS */
.hs {
  position:absolute; width:28px; height:28px;
  transform:translate(-50%,-50%); cursor:pointer; z-index:15;
}
.hs-ring { position:absolute; inset:0; border-radius:50%; border:2px solid #a855f7; animation:hspulse 2s infinite; }
.hs-dot { position:absolute; inset:5px; border-radius:50%; background:#a855f7; transition:transform 0.15s; }
.hs:hover .hs-dot { transform:scale(1.5); }
.hs-tip {
  position:absolute; left:34px; top:50%; transform:translateY(-50%);
  background:rgba(124,58,237,0.95); color:#fff; font-size:0.65rem; font-weight:700;
  padding:3px 10px; border-radius:20px; white-space:nowrap; opacity:0;
  transition:opacity 0.2s; pointer-events:none; letter-spacing:0.5px; text-transform:uppercase;
}
.hs:hover .hs-tip { opacity:1; }
.hs.behind { opacity:0.2; pointer-events:none; }
@keyframes hspulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(2.4);opacity:0} }

/* PANEL */
.panel {
  position:absolute; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center; padding:16px;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.panel.open { opacity:1; pointer-events:all; }
.p-back { position:absolute; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); }
.p-card {
  position:relative; z-index:1; background:#141414;
  border:1px solid #7c3aed; border-radius:14px; padding:28px;
  max-width:400px; width:100%; box-shadow:0 0 50px rgba(124,58,237,0.35);
}
.p-close {
  position:absolute; top:12px; right:12px; background:#1a1a1a;
  border:1px solid rgba(255,255,255,0.08); color:#777;
  width:28px; height:28px; border-radius:50%; cursor:pointer;
  font-size:0.82rem; display:flex; align-items:center; justify-content:center;
}
.p-close:hover { border-color:#7c3aed; color:#fff; }
.p-icon { font-size:2rem; margin-bottom:8px; }
.p-title { font-size:1.35rem; font-weight:700; color:#a855f7; margin-bottom:6px; }
.p-desc { color:#777; font-size:0.84rem; line-height:1.75; margin-bottom:14px; }
.p-video {
  width:100%; aspect-ratio:16/9; background:#1a1a1a; border-radius:8px;
  border:1px solid rgba(255,255,255,0.06); display:flex; align-items:center;
  justify-content:center; flex-direction:column; gap:6px; color:#444;
  font-size:0.78rem; margin-bottom:12px;
}
.p-price {
  display:inline-block; background:rgba(124,58,237,0.15);
  border:1px solid rgba(168,85,247,0.3); color:#a855f7;
  padding:4px 14px; border-radius:20px; font-size:0.76rem; font-weight:600; margin-bottom:14px;
}
.p-cta {
  display:block; width:100%; text-align:center; background:#7c3aed;
  color:#fff; padding:11px; border-radius:8px; font-weight:700;
  font-size:0.88rem; border:none; cursor:pointer; transition:background 0.2s;
}
.p-cta:hover { background:#a855f7; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="loading" id="loading">
  <div class="loading-text">LOADING MODEL</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadBar"></div></div>
  <div class="loading-text" id="loadPct">0%</div>
</div>

<div class="hint">🖱️ Drag to rotate · Scroll to zoom · Click dots for details</div>

<div class="panel" id="panel">
  <div class="p-back" onclick="closePanel()"></div>
  <div class="p-card">
    <button class="p-close" onclick="closePanel()">✕</button>
    <div class="p-icon" id="pIcon"></div>
    <div class="p-title" id="pTitle"></div>
    <div class="p-desc" id="pDesc"></div>
    <div class="p-video"><span style="font-size:1.6rem">🎬</span><span>Video coming soon</span></div>
    <div class="p-price" id="pPrice"></div>
    <button class="p-cta" onclick="closePanel()">Book This Service →</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const DATA = {
  wheel:   { icon:'🛞', title:'Wheel & Tire Detail',     price:'Included in Full Detail', desc:'Deep cleaning with specialized decontamination products. Removes brake dust, iron deposits and road grime — leaving your wheels spotless.' },
  hood:    { icon:'✨', title:'Hood Polish & Protection', price:'Starting at $149',        desc:'Multi-stage paint correction removing swirl marks and oxidation. Finished with ceramic coat for a mirror-like shine.' },
  side:    { icon:'🪄', title:'Paint Correction',         price:'Starting at $149',        desc:'Full-body decontamination and machine polish. We restore your car\'s factory gloss using a dual-action polisher.' },
  window:  { icon:'🔮', title:'Window Tinting',           price:'Starting at $199',        desc:'Ceramic or high-performance film. Blocks up to 99% UV rays, reduces heat and adds privacy.' },
  bumper:  { icon:'🛡️', title:'Bumper & Trim Detail',     price:'Included in Full Detail', desc:'Plastic restoration and deep cleaning of all bumpers and trim. UV protection applied to prevent fading.' },
};

// THREE SETUP
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);
scene.fog = new THREE.Fog(0x0d0d0d, 15, 40);

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
camera.position.set(0, 1.5, 9);
camera.lookAt(0, 0.8, 0);

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(5, 10, 5);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xffffff, 0.8);
fill.position.set(-5, 3, -5);
scene.add(fill);
const pL = new THREE.PointLight(0xffffff, 1.5, 20);
pL.position.set(-5, 4, -2);
scene.add(pL);
const pR = new THREE.PointLight(0xffffff, 1.0, 15);
pR.position.set(5, 2, 4);
scene.add(pR);
// Subtle purple rim light only
const rimL = new THREE.PointLight(0x7c3aed, 1.5, 8);
rimL.position.set(0, -0.5, -4);
scene.add(rimL);



// LOAD MODEL
let carModel = null;
const loader = new THREE.GLTFLoader();
loader.load(
  'car.glb',
  (gltf) => {
    carModel = gltf.scene;

    // Center and scale properly
    const bbox = new THREE.Box3().setFromObject(carModel);
    const size = bbox.getSize(new THREE.Vector3());
    const center = bbox.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 4.0 / maxDim;

    // Move geometry to origin BEFORE adding to scene
    carModel.position.set(
      -center.x,
      -bbox.min.y,
      -center.z
    );
    carModel.scale.setScalar(scale);

    carModel.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        if (child.material) {
          child.material.envMapIntensity = 1.2;
        }
      }
    });

    scene.add(carModel);
    document.getElementById('loading').style.display = 'none';
    createHotspots();
  },
  (progress) => {
    const pct = Math.round((progress.loaded / progress.total) * 100);
    document.getElementById('loadBar').style.width = pct + '%';
    document.getElementById('loadPct').textContent = pct + '%';
  },
  (err) => {
    console.error(err);
    document.getElementById('loading').innerHTML = '<div style="color:#a855f7;font-size:0.9rem;">Failed to load model</div>';
  }
);

// HOTSPOT DEFINITIONS (positions relative to car, will be scaled)
// Positions tuned to BMW M3 Touring model
const HOTSPOT_DEFS = [
  { key:'wheel',  localPos: new THREE.Vector3( 1.30,  0.10,  0.85), label:'Wheel Detail' },
  { key:'hood',   localPos: new THREE.Vector3( 0.80,  0.72,  0.00), label:'Hood Polish' },
  { key:'side',   localPos: new THREE.Vector3( 0.00,  0.50,  1.00), label:'Paint Correction' },
  { key:'window', localPos: new THREE.Vector3( 0.10,  0.90,  0.70), label:'Window Tinting' },
  { key:'bumper', localPos: new THREE.Vector3( 1.80,  0.30,  0.00), label:'Bumper Detail' },
];

const hsEls = {};
function createHotspots() {
  HOTSPOT_DEFS.forEach(hs => {
    const el = document.createElement('div');
    el.className = 'hs';
    el.id = 'hs-' + hs.key;
    el.innerHTML = `<div class="hs-ring"></div><div class="hs-dot"></div><div class="hs-tip">${hs.label}</div>`;
    el.addEventListener('click', () => openPanel(hs.key));
    document.body.appendChild(el);
    hsEls[hs.key] = { el, localPos: hs.localPos };
  });
}

const _world = new THREE.Vector3();
const _ndc   = new THREE.Vector3();
function updateHotspots() {
  if (!carModel) return;
  carModel.updateMatrixWorld(true);
  HOTSPOT_DEFS.forEach(hs => {
    const entry = hsEls[hs.key];
    if (!entry) return;
    _world.copy(hs.localPos).applyMatrix4(carModel.matrixWorld);
    _ndc.copy(_world).project(camera);
    const x = ( _ndc.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-_ndc.y * 0.5 + 0.5) * window.innerHeight;
    entry.el.style.left = x + 'px';
    entry.el.style.top  = y + 'px';
    entry.el.classList.toggle('behind', _ndc.z > 1);
  });
}

// ORBIT
let drag=false, px=0, py=0, rotY=0.3, rotX=0.1, zoom=9, auto=true, aTimer=null;

canvas.addEventListener('mousedown', e=>{ drag=true; px=e.clientX; py=e.clientY; auto=false; });
window.addEventListener('mouseup', ()=>{ drag=false; clearTimeout(aTimer); aTimer=setTimeout(()=>auto=true,3500); });
canvas.addEventListener('mousemove', e=>{
  if(!drag) return;
  rotY+=(e.clientX-px)*0.008; px=e.clientX; py=e.clientY;
});
canvas.addEventListener('wheel', e=>{
  e.preventDefault(); zoom+=e.deltaY*0.01; zoom=Math.max(3,Math.min(12,zoom));
},{passive:false});
canvas.addEventListener('touchstart', e=>{ drag=true; px=e.touches[0].clientX; py=e.touches[0].clientY; auto=false; },{passive:true});
window.addEventListener('touchend', ()=>{ drag=false; clearTimeout(aTimer); aTimer=setTimeout(()=>auto=true,3500); });
canvas.addEventListener('touchmove', e=>{
  if(!drag) return;
  rotY+=(e.touches[0].clientX-px)*0.010; px=e.touches[0].clientX; py=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});

// PANEL
function openPanel(key) {
  const d = DATA[key];
  document.getElementById('pIcon').textContent  = d.icon;
  document.getElementById('pTitle').textContent = d.title;
  document.getElementById('pDesc').textContent  = d.desc;
  document.getElementById('pPrice').textContent = d.price;
  document.getElementById('panel').classList.add('open');
  auto = false;
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  setTimeout(()=>auto=true,800);
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePanel(); });

// ANIMATE
let t=0;
function animate() {
  requestAnimationFrame(animate);
  t+=0.004;
  if(auto && carModel) rotY+=0.004;
  if(carModel) { carModel.rotation.y=rotY; carModel.rotation.x=0.1; }
  camera.position.set(0,1.5,zoom);
  camera.lookAt(0,0.8,0);
  rimL.intensity = 1.2+Math.sin(t)*0.4;
  renderer.render(scene,camera);
  updateHotspots();
}
animate();
</script>
</body>
</html>
