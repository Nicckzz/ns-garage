<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS Garage 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0d0d; overflow:hidden; font-family:'DM Sans',sans-serif; }
#c { display:block; width:100vw; height:100vh; }

.view-toggle {
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  display:flex; gap:4px; background:rgba(26,26,26,0.95);
  border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:4px; z-index:20;
}
.vbtn {
  background:none; border:none; color:#888; font-size:0.82rem; font-weight:600;
  padding:8px 22px; border-radius:7px; cursor:pointer; transition:all 0.2s;
  font-family:sans-serif;
}
.vbtn.active { background:#7c3aed; color:#fff; }

.hint {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.07);
  border-radius:20px; padding:5px 14px; font-size:0.7rem; color:#666;
  white-space:nowrap; z-index:20;
}

/* HOTSPOTS */
.hs {
  position:absolute; width:26px; height:26px;
  transform:translate(-50%,-50%); cursor:pointer; z-index:15;
}
.hs-ring {
  position:absolute; inset:0; border-radius:50%;
  border:2px solid #a855f7; animation:pulse 2s infinite;
}
.hs-dot {
  position:absolute; inset:5px; border-radius:50%;
  background:#a855f7; transition:transform 0.2s;
}
.hs:hover .hs-dot { transform:scale(1.4); }
.hs-tip {
  position:absolute; left:32px; top:50%; transform:translateY(-50%);
  background:rgba(124,58,237,0.95); color:#fff; font-size:0.68rem;
  font-weight:600; padding:3px 10px; border-radius:20px;
  white-space:nowrap; opacity:0; transition:opacity 0.2s;
  pointer-events:none; letter-spacing:0.5px; text-transform:uppercase;
}
.hs:hover .hs-tip { opacity:1; }
@keyframes pulse {
  0%{transform:scale(1);opacity:1}
  100%{transform:scale(2.2);opacity:0}
}

/* PANEL */
.panel {
  position:absolute; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center; padding:16px;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.panel.open { opacity:1; pointer-events:all; }
.p-back { position:absolute; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(6px); }
.p-card {
  position:relative; z-index:1; background:#141414;
  border:1px solid #7c3aed; border-radius:14px; padding:28px;
  max-width:420px; width:100%; box-shadow:0 0 40px rgba(124,58,237,0.3);
}
.p-close {
  position:absolute; top:12px; right:12px; background:#1a1a1a;
  border:1px solid rgba(255,255,255,0.07); color:#888;
  width:28px; height:28px; border-radius:50%; cursor:pointer;
  font-size:0.85rem; display:flex; align-items:center; justify-content:center;
}
.p-icon { font-size:2rem; margin-bottom:8px; }
.p-title { font-size:1.4rem; font-weight:700; color:#a855f7; margin-bottom:6px; }
.p-desc { color:#888; font-size:0.85rem; line-height:1.7; margin-bottom:16px; }
.p-video {
  width:100%; aspect-ratio:16/9; background:#1a1a1a;
  border-radius:8px; border:1px solid rgba(255,255,255,0.07);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:8px; color:#555; font-size:0.8rem; margin-bottom:14px;
}
.p-price {
  display:inline-block; background:rgba(124,58,237,0.15);
  border:1px solid rgba(168,85,247,0.3); color:#a855f7;
  padding:4px 14px; border-radius:20px; font-size:0.78rem;
  font-weight:600; margin-bottom:16px;
}
.p-cta {
  display:block; width:100%; text-align:center; background:#7c3aed;
  color:#fff; padding:11px; border-radius:8px; font-weight:600;
  font-size:0.88rem; text-decoration:none; border:none; cursor:pointer;
}
.p-cta:hover { background:#a855f7; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="view-toggle">
  <button class="vbtn active" id="btn-ext" onclick="setView('exterior')">🚗 Exterior</button>
  <button class="vbtn" id="btn-int" onclick="setView('interior')">🪑 Interior</button>
</div>

<div class="hint">🖱️ Drag to rotate · Scroll to zoom · Click dots</div>

<!-- EXTERIOR HOTSPOTS -->
<div class="hs" id="hs-wheel" style="left:71%;top:70%;" onclick="openPanel('wheel')">
  <div class="hs-ring"></div><div class="hs-dot"></div>
  <div class="hs-tip">Wheel Detail</div>
</div>
<div class="hs" id="hs-hood" style="left:30%;top:32%;" onclick="openPanel('hood')">
  <div class="hs-ring"></div><div class="hs-dot"></div>
  <div class="hs-tip">Hood Polish</div>
</div>
<div class="hs" id="hs-side" style="left:52%;top:52%;" onclick="openPanel('side')">
  <div class="hs-ring"></div><div class="hs-dot"></div>
  <div class="hs-tip">Paint Correction</div>
</div>
<div class="hs" id="hs-win" style="left:48%;top:30%;" onclick="openPanel('window')">
  <div class="hs-ring"></div><div class="hs-dot"></div>
  <div class="hs-tip">Window Tinting</div>
</div>

<!-- INTERIOR HOTSPOTS (hidden by default) -->
<div class="hs" id="hs-seat" style="left:45%;top:55%;display:none;" onclick="openPanel('seat')">
  <div class="hs-ring"></div><div class="hs-dot"></div>
  <div class="hs-tip">Seat Cleaning</div>
</div>
<div class="hs" id="hs-dash" style="left:35%;top:38%;display:none;" onclick="openPanel('dashboard')">
  <div class="hs-ring"></div><div class="hs-dot"></div>
  <div class="hs-tip">Dashboard Detail</div>
</div>
<div class="hs" id="hs-carpet" style="left:58%;top:68%;display:none;" onclick="openPanel('carpet')">
  <div class="hs-ring"></div><div class="hs-dot"></div>
  <div class="hs-tip">Carpet Steam</div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="p-back" onclick="closePanel()"></div>
  <div class="p-card">
    <button class="p-close" onclick="closePanel()">✕</button>
    <div class="p-icon" id="pIcon">🔧</div>
    <div class="p-title" id="pTitle">Service</div>
    <div class="p-desc" id="pDesc"></div>
    <div class="p-video" id="pVideo"><span style="font-size:1.8rem">🎬</span><span>Video coming soon</span></div>
    <div class="p-price" id="pPrice"></div>
    <button class="p-cta" onclick="closePanel(); window.parent.document.getElementById('booking').scrollIntoView();">Book This Service →</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const DATA = {
  wheel:     { icon:'🛞', title:'Wheel & Tire Detail',    price:'Included in Full Detail', desc:'Deep cleaning of wheels and tires using specialized decontamination products. We remove brake dust, iron deposits, and road grime — leaving your wheels spotless and protected.' },
  hood:      { icon:'✨', title:'Hood Polish & Protection', price:'Starting at $149',        desc:'Multi-stage paint correction on the hood — removing swirl marks and oxidation. Finished with a ceramic coat for a mirror-like shine.' },
  side:      { icon:'🪄', title:'Paint Correction',        price:'Starting at $149',        desc:'Full-body paint decontamination and machine polish. We restore your car\'s factory gloss using a dual-action polisher.' },
  window:    { icon:'🔮', title:'Window Tinting',          price:'Starting at $199',        desc:'Ceramic or high-performance film. Blocks up to 99% UV rays, reduces heat and adds privacy — clean bubble-free finish.' },
  seat:      { icon:'🪑', title:'Seat & Upholstery',       price:'Starting at $129',        desc:'Hot water extraction and steam cleaning for fabric seats. Leather gets conditioning treatment to restore suppleness.' },
  dashboard: { icon:'📟', title:'Dashboard Detail',        price:'Starting at $129',        desc:'Compressed air blow-out of every vent and crevice. All surfaces cleaned, conditioned and dressed.' },
  carpet:    { icon:'🧹', title:'Carpet Steam Clean',      price:'Starting at $129',        desc:'Deep vacuum followed by steam extraction on all carpets. Removes embedded dirt, stains and odors.' }
};

// ── RENDERER ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── LIGHTS ────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dir = new THREE.DirectionalLight(0xffffff, 1.5);
dir.position.set(5, 8, 4);
scene.add(dir);
const pL = new THREE.PointLight(0x7c3aed, 3, 12);
pL.position.set(-3, 3, -2);
scene.add(pL);
const pR = new THREE.PointLight(0xa855f7, 1.5, 8);
pR.position.set(3, 1, 3);
scene.add(pR);

// ── MATERIALS ─────────────────────────────────────────────────────────
const M = {
  body:   new THREE.MeshStandardMaterial({ color:0x111122, metalness:0.92, roughness:0.12 }),
  glass:  new THREE.MeshStandardMaterial({ color:0x5020a0, metalness:0.05, roughness:0.05, transparent:true, opacity:0.55 }),
  tire:   new THREE.MeshStandardMaterial({ color:0x0a0a0a, roughness:0.95 }),
  rim:    new THREE.MeshStandardMaterial({ color:0xcccccc, metalness:0.98, roughness:0.08 }),
  chrome: new THREE.MeshStandardMaterial({ color:0xdddddd, metalness:1, roughness:0.05 }),
  light:  new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffffff, emissiveIntensity:0.8 }),
  tail:   new THREE.MeshStandardMaterial({ color:0xff1111, emissive:0xff0000, emissiveIntensity:0.6 }),
  seat:   new THREE.MeshStandardMaterial({ color:0x1a0530, roughness:0.8 }),
  dash:   new THREE.MeshStandardMaterial({ color:0x0d0d0d, metalness:0.3, roughness:0.7 }),
};

// ── BUILD EXTERIOR ────────────────────────────────────────────────────
function buildExterior() {
  const g = new THREE.Group();

  // Body layers
  const add = (geo, mat, x, y, z) => { const m = new THREE.Mesh(geo, mat); m.position.set(x,y,z); g.add(m); return m; };

  add(new THREE.BoxGeometry(4.2, 0.52, 1.85), M.body, 0, 0.36, 0);    // lower body
  add(new THREE.BoxGeometry(4.0, 0.28, 1.78), M.body, 0, 0.66, 0);    // mid body
  add(new THREE.BoxGeometry(2.4, 0.72, 1.65), M.body, -0.1, 1.06, 0); // cabin

  // Hood & trunk
  add(new THREE.BoxGeometry(1.7, 0.09, 1.78), M.body,  1.15, 0.82, 0);
  add(new THREE.BoxGeometry(0.9, 0.09, 1.78), M.body, -1.75, 0.82, 0);

  // Bumpers
  add(new THREE.BoxGeometry(0.28, 0.32, 1.86), M.chrome,  2.06, 0.3, 0);
  add(new THREE.BoxGeometry(0.28, 0.32, 1.86), M.chrome, -2.06, 0.3, 0);

  // Windshields
  const wsFront = new THREE.Mesh(new THREE.PlaneGeometry(1.55, 0.68), M.glass);
  wsFront.position.set(0.95, 1.01, 0); wsFront.rotation.y = -1.26; g.add(wsFront);
  const wsRear  = new THREE.Mesh(new THREE.PlaneGeometry(1.35, 0.62), M.glass);
  wsRear.position.set(-1.1, 1.01, 0);  wsRear.rotation.y  =  1.26; g.add(wsRear);

  // Side windows
  [-0.84, 0.84].forEach(z => {
    const sw = new THREE.Mesh(new THREE.PlaneGeometry(1.9, 0.58), M.glass);
    sw.position.set(-0.1, 1.06, z); sw.rotation.y = z > 0 ? 0 : Math.PI; g.add(sw);
  });

  // Headlights & taillights
  [[1.99,0.46, 0.68,M.light],[1.99,0.46,-0.68,M.light]].forEach(([x,y,z,m])=>
    add(new THREE.BoxGeometry(0.07,0.2,0.38), m, x, y, z));
  [[-1.99,0.46,0.68,M.tail],[-1.99,0.46,-0.68,M.tail]].forEach(([x,y,z,m])=>
    add(new THREE.BoxGeometry(0.07,0.2,0.38), m, x, y, z));

  // Wheels
  [[1.2,0,0.96],[1.2,0,-0.96],[-1.2,0,0.96],[-1.2,0,-0.96]].forEach(([x,y,z])=>{
    const tire = new THREE.Mesh(new THREE.TorusGeometry(0.37,0.14,16,32), M.tire);
    tire.rotation.y = Math.PI/2; tire.position.set(x,y,z); g.add(tire);
    const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.29,0.29,0.13,16), M.rim);
    rim.rotation.z = Math.PI/2; rim.position.set(x,y,z); g.add(rim);
    for(let i=0;i<5;i++){
      const sp = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.52,0.04), M.rim);
      sp.position.set(x,y,z); sp.rotation.z=Math.PI/2; sp.rotation.x=(i/5)*Math.PI*2; g.add(sp);
    }
  });

  // Ground glow
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(5,2.2),
    new THREE.MeshBasicMaterial({color:0x7c3aed,transparent:true,opacity:0.07}));
  glow.rotation.x = -Math.PI/2; glow.position.y = -0.38; g.add(glow);

  return g;
}

// ── BUILD INTERIOR ────────────────────────────────────────────────────
function buildInterior() {
  const g = new THREE.Group();
  const add = (geo,mat,x,y,z) => { const m=new THREE.Mesh(geo,mat); m.position.set(x,y,z); g.add(m); };

  // Floor / roof
  add(new THREE.PlaneGeometry(3.2,2.2), new THREE.MeshStandardMaterial({color:0x080808,roughness:0.9}), 0,-0.22,0);
  const fl = g.children[g.children.length-1]; fl.rotation.x=-Math.PI/2;
  add(new THREE.PlaneGeometry(3.2,2.2), new THREE.MeshStandardMaterial({color:0x111111,roughness:0.8}), 0,1.1,0);
  const rf = g.children[g.children.length-1]; rf.rotation.x=Math.PI/2;

  // Seats
  [[0.3,0,0.42],[0.3,0,-0.42],[-0.6,0,0.42],[-0.6,0,-0.42]].forEach(([x,y,z])=>{
    add(new THREE.BoxGeometry(0.72,0.14,0.58), M.seat, x,y+0.07,z);
    add(new THREE.BoxGeometry(0.68,0.72,0.1),  M.seat, x-0.3,y+0.43,z);
    // headrest
    add(new THREE.BoxGeometry(0.5,0.2,0.1), M.seat, x-0.3,y+0.85,z);
  });

  // Dashboard
  add(new THREE.BoxGeometry(0.18,0.42,2.1), M.dash, 1.1,0.28,0);
  add(new THREE.BoxGeometry(0.12,0.1,1.8),  new THREE.MeshStandardMaterial({color:0x1a0a2e,metalness:0.5}), 0.95,0.52,0);

  // Steering wheel
  const sw = new THREE.Mesh(new THREE.TorusGeometry(0.22,0.03,8,24), new THREE.MeshStandardMaterial({color:0x222222,metalness:0.5,roughness:0.4}));
  sw.position.set(0.78,0.52,0.42); sw.rotation.y=-0.3; g.add(sw);

  // Center console
  add(new THREE.BoxGeometry(0.85,0.22,0.32), new THREE.MeshStandardMaterial({color:0x0a0a0a,metalness:0.4}), 0,0.11,0);

  // Door panels
  [-0.86,0.86].forEach(z=>{
    add(new THREE.BoxGeometry(2.6,0.8,0.06), new THREE.MeshStandardMaterial({color:0x111111,roughness:0.8}), 0,0.3,z);
  });

  return g;
}

const extCar = buildExterior();
const intCar = buildInterior();
intCar.visible = false;
scene.add(extCar); scene.add(intCar);

// ── ORBIT ─────────────────────────────────────────────────────────────
let drag=false, px=0, py=0, rotY=0.4, rotX=0.08, zoom=6.5, auto=true, aTimer=null;

canvas.addEventListener('mousedown', e=>{ drag=true; px=e.clientX; py=e.clientY; auto=false; });
window.addEventListener('mouseup', ()=>{ drag=false; clearTimeout(aTimer); aTimer=setTimeout(()=>auto=true,3000); });
canvas.addEventListener('mousemove', e=>{
  if(!drag) return;
  rotY += (e.clientX-px)*0.010; rotX += (e.clientY-py)*0.005;
  rotX = Math.max(-0.45, Math.min(0.55, rotX)); px=e.clientX; py=e.clientY;
});
canvas.addEventListener('wheel', e=>{ e.preventDefault(); zoom+=e.deltaY*0.008; zoom=Math.max(2.8,Math.min(8,zoom)); },{passive:false});
canvas.addEventListener('touchstart', e=>{ drag=true; px=e.touches[0].clientX; py=e.touches[0].clientY; auto=false; },{passive:true});
canvas.addEventListener('touchend', ()=>{ drag=false; clearTimeout(aTimer); aTimer=setTimeout(()=>auto=true,3000); });
canvas.addEventListener('touchmove', e=>{
  if(!drag) return;
  rotY+=(e.touches[0].clientX-px)*0.012; rotX+=(e.touches[0].clientY-py)*0.006;
  rotX=Math.max(-0.45,Math.min(0.55,rotX)); px=e.touches[0].clientX; py=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});

// ── VIEW TOGGLE ───────────────────────────────────────────────────────
let currentView = 'exterior';
function setView(v) {
  currentView = v;
  document.getElementById('btn-ext').classList.toggle('active', v==='exterior');
  document.getElementById('btn-int').classList.toggle('active', v==='interior');
  extCar.visible = v==='exterior';
  intCar.visible = v==='interior';
  ['hs-wheel','hs-hood','hs-side','hs-win'].forEach(id=>
    document.getElementById(id).style.display = v==='exterior'?'block':'none');
  ['hs-seat','hs-dash','hs-carpet'].forEach(id=>
    document.getElementById(id).style.display = v==='interior'?'block':'none');
  zoom = v==='interior' ? 3.8 : 5.2;
  camera.position.y = v==='interior' ? 0.5 : 1.5;
}

// ── PANEL ─────────────────────────────────────────────────────────────
function openPanel(key) {
  const d = DATA[key];
  document.getElementById('pIcon').textContent  = d.icon;
  document.getElementById('pTitle').textContent = d.title;
  document.getElementById('pDesc').textContent  = d.desc;
  document.getElementById('pPrice').textContent = d.price;
  document.getElementById('panel').classList.add('open');
  auto = false;
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  setTimeout(()=>auto=true, 800);
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePanel(); });

// ── ANIMATE ───────────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.004;
  if(auto) rotY += 0.004;

  const pivot = currentView==='exterior' ? extCar : intCar;
  extCar.rotation.y = rotY; extCar.rotation.x = rotX;
  intCar.rotation.y = rotY; intCar.rotation.x = rotX;

  camera.position.set(0, currentView==='interior'?0.5:1.5, zoom);
  camera.lookAt(0, currentView==='interior'?0.3:0.5, 0);
  pL.intensity = 2.5 + Math.sin(t)*0.8;
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
